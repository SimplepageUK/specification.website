name: Lighthouse

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # Serves ./dist itself and asserts the four category scores in
      # lighthouserc.json. Fails the PR on a regression below threshold.
      # Reports are written to ./.lighthouseci (no third-party upload).
      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 7

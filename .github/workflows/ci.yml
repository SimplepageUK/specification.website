name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (Astro)
        run: npx astro check

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artefact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 7

# Cloudflare Pages — bindings for specification.website.
#
# Pages itself is deployed via the Pages dashboard's Git integration (see
# CLAUDE.md). This file only carries the bindings the Functions in
# /functions/ need; they're picked up at build time on the Pages side.
#
# The MCP Worker in /mcp/ has its own wrangler.toml — deploy it separately
# with `cd mcp && npm run deploy`.

name = "specification-website"
compatibility_date = "2026-05-29"
pages_build_output_dir = "./dist"

# Analytics Engine bindings removed on the SimplepageUK fork: AE writes from
# Pages Functions require the Workers Paid plan. bot-detect.ts guards for the
# missing binding and skips silently, so the site and MCP work without it.
# Re-add the [[analytics_engine_datasets]] block if moving to Workers Paid.
